exclude: "^/migrations/|uv.lock"
default_stages: [pre-commit]
minimum_pre_commit_version: "4.6.0"

default_language_version:
  golang: 1.26.4
  node: 24.16.0
  python: python3.13
  rust: 1.96.0

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            kiss_cache/static/kiss_cache/css/.*|
            kiss_cache/static/kiss_cache/js/.*|
          )$
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: detect-private-key
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
    - id: pyupgrade
      args: ["--py313-plus"]

  # - repo: https://github.com/UnknownPlatypus/djangofmt-pre-commit
  #   rev: v0.2.10
  #   hooks:
  #     - id: djangofmt

  # - repo: https://github.com/adamchainz/djade-pre-commit
  #   rev: 1.9.0
  #   hooks:
  #   - id: djade
  #     args: ["--target-version", "5.2"]

  # - repo: https://github.com/Riverside-Healthcare/djLint
  #   rev: v1.38.2
  #   hooks:
  #     - id: djlint-django
  #       args: ["--ignore", "H008"]

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.30.0
    hooks:
      - id: django-upgrade
        args: ["--target-version", "5.2"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # - repo: https://github.com/codespell-project/codespell
  #   rev: v2.4.2
  #   hooks:
  #     - id: codespell
  #       additional_dependencies:
  #         - "tomli==2.4.1"
  #       exclude: |
  #         (?x)^(
  #           uv.lock|
  #           kiss_cache/static/kiss_cache/css/.*|
  #           kiss_cache/static/kiss_cache/js/.*|
  #         )$

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: ["--ignore", "DL3008"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        additional_dependencies:
          - "bandit[toml]"
        args:
          - "--configfile=pyproject.toml"
          - "--severity-level=medium"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.4.0
    hooks:
      - id: betterleaks
        name: betterleaks

  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: detect hardcoded secrets
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail --trust-local-git-config --no-update'
        language: system
        stages: ["pre-commit", "pre-push"]

  - repo: https://github.com/thoughtworks/talisman
    rev: v1.37.0
    hooks:
      - id: talisman-commit

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.23.0
    hooks:
      - id: pyproject-fmt

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
