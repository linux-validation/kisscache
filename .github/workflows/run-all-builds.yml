permissions:
    contents: read
    checks: write
    id-token: write
    packages: write

name: Run all KissCache container builds
on: [workflow_dispatch, push, pull_request]
jobs:
  run-docker-build:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        exclude:
          - arch: arm64
            runner: ubuntu-latest
          - arch: amd64
            runner: ubuntu-24.04-arm
    uses: ./.github/workflows/generic-docker-build-job.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
  run-multiarch:
    needs: [run-docker-build]
    runs-on: ubuntu-latest
    container:
      image: docker:24
      env:
        DOCKER_DRIVER: overlay2
        DOCKER_BUILDKIT: 1
    services:
      dind:
        image: docker:24-dind
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - run: git config --global --add safe.directory $PWD
      - run: ./.gitlab-ci/publish/docker-multiarch.sh setup
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          CI_REGISTRY_USER: ${{ github.actor }}
          CI_REGISTRY: ghcr.io
      - run: ./.gitlab-ci/publish/docker-multiarch.sh
        env:
          CI_REGISTRY_OVERRIDE: ghcr.io/${{ github.repository }}/kisscache-${{ github.ref_name }}
          CI_COMMIT_TAG: ${{ github.ref_name }}