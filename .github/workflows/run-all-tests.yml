permissions:
    contents: read
    checks: write
    id-token: write

name: Run all KissCache tests
on: [workflow_dispatch, push, pull_request]
jobs:
  run-analyze:
    strategy:
      fail-fast: false
      matrix:
        analyze: [black, pylint]
    uses: ./.github/workflows/generic-analyze-job.yml
    with:
      analyze: ${{ matrix.analyze }}  
  run-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - run: apt-get update -qq
      - run: apt-get install --no-install-recommends -y git python3 python3-celery python3-django python3-requests python3-pytest python3-pylint-celery python3-pytest-cov python3-pytest-django python3-pytest-mock
      - name: checkout repo
        uses: actions/checkout@v6
      - run: git config --global --add safe.directory $PWD
      - run: ln -s tests/manage.py manage.py
      - run: PYTHONPATH=. pytest-3 -v --junitxml=kiss_cache.xml --cov=kiss_cache --cov-report=html --cov-report=term --cov-fail-under=92 tests/
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "kiss_cache.xml"

