stages:
- test
- analyze
- build
- publish

#############
# Templates #
#############
.job:
  before_script:
  - ./.gitlab-ci/$CI_JOB_STAGE/$CI_JOB_NAME.sh setup
  dependencies: []
  except: [schedules]
  script:
  - ./.gitlab-ci/$CI_JOB_STAGE/$CI_JOB_NAME.sh

.dind:
  extends: .job
  image: docker:24.0.9
  variables:
    DOCKER_DRIVER: "overlay2"
    DOCKER_CLI_EXPERIMENTAL: "enabled"
  services:
  - docker:24.0.9-dind

.docker:
  extends: .dind
  stage: build

.analyze:
  extends: .job
  image: debian:bookworm
  stage: analyze
  except:
    refs:
    - tags

########
# Test #
########
test-debian-12:
  extends: .job
  image: debian:bookworm
  stage: test
  before_script:
  - apt-get update -qq
  - apt-get install --no-install-recommends -y python3 python3-celery python3-django python3-requests
  - apt-get install --no-install-recommends -y python3-pytest python3-pylint-celery python3-pytest-cov python3-pytest-django python3-pytest-mock
  coverage: '/^TOTAL.+ (\d+)%$/'
  script:
  - ln -s tests/manage.py manage.py
  - PYTHONPATH=. pytest-3 -v --junitxml=kiss_cache.xml --cov=kiss_cache --cov-report=html --cov-report=term --cov-fail-under=92 tests/
  artifacts:
    paths:
    - htmlcov/
    reports:
      junit:
      - kiss_cache.xml

###########
# Analyze #
###########
black:
  extends: .analyze

pylint:
  extends: .analyze

# static analysis with bandit
include:
  template: SAST.gitlab-ci.yml
sast:
  stage: analyze
  variables:
    DOCKER_DRIVER: overlay2
    SAST_DEFAULT_ANALYZERS: "bandit"

#########
# Build #
#########
docker-amd64:
  extends: .docker

docker-arm64:
  extends: .docker
  tags:
   - saas-linux-small-arm64


###########
# Publish #
###########
docker-multiarch:
  extends: .docker
  stage: publish
  only:
    refs:
    - master
