stages:
- test
- analyze
- build
- publish

#############
# Templates #
#############
.job:
  before_script:
  - ./.gitlab-ci/$CI_JOB_STAGE/$CI_JOB_NAME.sh setup
  dependencies: []
  except: [schedules]
  script:
  - ./.gitlab-ci/$CI_JOB_STAGE/$CI_JOB_NAME.sh

.dind:
  extends: .job
  image: docker:24.0.9
  variables:
    DOCKER_DRIVER: "overlay2"
    DOCKER_CLI_EXPERIMENTAL: "enabled"
  services:
  - docker:24.0.9-dind

.docker:
  extends: .dind
  stage: build

.analyze:
  extends: .job
  image: ghcr.io/astral-sh/uv:0.11-python3.13-trixie-slim
  variables:
    UV_LINK_MODE: copy
  stage: analyze
  except:
    refs:
    - tags

########
# Test #
########
test-debian-13:
  extends: .job
  image: ghcr.io/astral-sh/uv:0.11-python3.13-trixie-slim
  variables:
    UV_LINK_MODE: copy
  stage: test
  before_script:
  - uv sync --frozen --group dev
  coverage: '/^TOTAL.+ (\d+)%$/'
  script:
  - uv run pytest -v --junitxml=kiss_cache.xml --cov=kiss_cache --cov-report=html --cov-report=term --cov-fail-under=92 tests/
  artifacts:
    paths:
    - htmlcov/
    reports:
      junit:
      - kiss_cache.xml

###########
# Analyze #
###########
black:
  extends: .analyze

pylint:
  extends: .analyze

# static analysis with bandit
include:
  template: SAST.gitlab-ci.yml
sast:
  stage: analyze
  variables:
    DOCKER_DRIVER: overlay2
    SAST_DEFAULT_ANALYZERS: "bandit"

#########
# Build #
#########
docker-amd64:
  extends: .docker

docker-arm64:
  extends: .docker
  tags:
   - saas-linux-small-arm64

###########
# Publish #
###########
docker-multiarch:
  extends: .docker
  stage: publish
  only:
    refs:
    - master
